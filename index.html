<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고충처리 시스템</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>고충처리 시스템</h1>
      <p>임직원 고충을 안전하게 접수하고 처리 현황을 확인할 수 있습니다.</p>
    </header>

    <main class="grid">
      <section class="card">
        <h2>직원 로그인</h2>
        <form id="loginForm">
          <label>이름</label>
          <input type="text" id="name" placeholder="이름 입력" />

          <label>생년월일 8자리</label>
          <input type="text" id="birthDate" placeholder="예: 19900101" maxlength="8" />

          <label>휴대폰 뒤 4자리</label>
          <input type="password" id="phoneLast4" placeholder="예: 1234" maxlength="4" />

          <button type="submit">로그인</button>
        </form>
        <p class="help">현재는 화면 초안입니다. 로그인 기능은 다음 단계에서 연결합니다.</p>
      </section>

      <section class="card">
        <h2>고충 접수</h2>
        <form id="complaintForm">
          <label>제목</label>
          <input type="text" id="title" placeholder="제목 입력" />

          <label>고충 유형</label>
          <select id="category">
            <option value="">선택</option>
            <option>인사</option>
            <option>직장 내 괴롭힘</option>
            <option>안전보건</option>
            <option>근무환경</option>
            <option>기타</option>
          </select>

          <label>내용</label>
          <textarea id="content" rows="6" placeholder="내용을 입력하세요"></textarea>

          <label class="checkbox">
            <input type="checkbox" id="anonymous" />
            직원 화면에서는 익명으로 표시
          </label>

          <button type="submit">접수하기</button>
        </form>
      </section>
      <section class="card">
        <h2>익명 공익 · 윤리 제보</h2>
        <form id="anonymousReportForm">
          <label>제보 유형</label>
          <select id="reportCategory">
            <option value="">선택</option>
            <option>공익제보</option>
            <option>윤리제보</option>
            <option>직장 내 괴롭힘</option>
            <option>성희롱·성폭력</option>
            <option>부당지시</option>
            <option>비위신고</option>
            <option>기타</option>
          </select>

          <label>제목</label>
          <input type="text" id="reportTitle" placeholder="제목 입력" />

          <label>내용</label>
          <textarea id="reportContent" rows="6" placeholder="익명 제보 내용을 입력하세요"></textarea>

          <button type="submit">익명 제보 접수</button>
        </form>
        <p class="help">
          익명 제보는 일반 직원 화면에 공개되지 않으며 관리자만 확인할 수 있습니다.
        </p>
      </section>
            <section class="card full">
        <h2>내 접수내역</h2>
        <button type="button" id="loadMyComplaintsBtn">내 접수내역 불러오기</button>
        <div id="myComplaintsList" class="complaint-list">
          <p class="help">로그인 후 버튼을 누르면 내 접수내역이 표시됩니다.</p>
        </div>
      </section>
      <section class="card full">
        <h2>처리 상태 안내</h2>
        <div class="status-list">
          <span>접수됨</span>
          <span>검토중</span>
          <span>조치완료</span>
          <span>반려</span>
          <span>숨김</span>
        </div>
        <p class="help">
          관리자만 게시글 숨김 및 처리 상태 변경이 가능하도록 구성할 예정입니다.
        </p>
      </section>
    </main>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
